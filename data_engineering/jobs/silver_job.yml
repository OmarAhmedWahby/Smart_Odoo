          notebook_task:
            notebook_path: ../notebooks/silver_layer/04_Purchase.ipynb

        - task_key: Stocks
            
          depends_on:
            - task_key: Sales

          notebook_task:
            notebook_path: ../notebooks/silver_layer/05_Stock.ipynb

        - task_key: Crm
            
          depends_on:
            - task_key: Sales

          notebook_task:
            notebook_path: ../notebooks/silver_layer/06_Crm.ipynb

        - task_key: Hr

          notebook_task:
            notebook_path: ../notebooks/silver_layer/07_Hr.ipynb

        - task_key: Invoice
            
          depends_on:
            - task_key: Sales

          notebook_task:
            notebook_path: ../notebooks/silver_layer/08_invoice.ipynb