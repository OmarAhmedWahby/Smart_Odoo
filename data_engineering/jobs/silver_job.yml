            notebook_path: ../notebooks/silver_layer/01_PartnerUser.ipynb
        
        - task_key: Product
          
          depends_on:
            - task_key: PartnerUser

          notebook_task:  
            notebook_path: ../notebooks/silver_layer/02_Product.ipynb

        - task_key: Sales
            
