resources:

  jobs:

    silver_job:

      name: silver_job

      job_clusters:

        - job_cluster_key: silver_cluster

          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1

      tasks:

        - task_key: Partner

          notebook_task:
            notebook_path: ./notebooks/silver/01_PartnerUser.ipynb
        
        - task_key: Product

          notebook_task:
            notebook_path: ./notebooks/silver/02_Product.ipynb